spring.application.name=course-record
server.servlet.context-path=/course-record

# Pagination for list APIs (query params: page, size, sort). Controllers also use @PageableDefault(size=20).
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size

spring.config.import=optional:file:./config/application-local.properties

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.change-log=classpath:liquibase/mysql/db-changelog-master.xml

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=dev-only-change-me-use-32bytes-minimum-secret-key
jwt.expiration-ms=3600000

app.admin.username=admin
app.admin.password=admin

# CORS for browser clients (e.g. Next.js). Comma-separated origins; required when allowCredentials=true (no "*").
app.cors.allowed-origins=http://localhost:3000
